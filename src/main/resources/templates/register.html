<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Registro - Portal de Coches')}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <main class="main">
        <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
            <div class="container">
                <h2 class="breadcrumb-title">Crear cuenta</h2>
                <ul class="breadcrumb-menu">
                    <li><a th:href="@{/}">Inicio</a></li>
                    <li class="active">Registro</li>
                </ul>
            </div>
        </div>

        <div class="login-area py-120">
            <div class="container">
                <div class="col-lg-8 mx-auto">
                    <div class="login-form">
                        <div class="login-header">
                            <img th:src="@{/img/logo/logo.png}" alt="Logo">
                            <p>Crea una cuenta como comprador o vendedor</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                            Revisa los campos marcados antes de continuar.
                        </div>

                        <form th:action="@{/register}" th:object="${userRegistrationDTO}" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre *</label>
                                    <input th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{name}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email *</label>
                                    <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{email}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Contraseña *</label>
                                    <input type="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{password}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Confirmar contraseña *</label>
                                    <input type="password" th:field="*{confirmPassword}" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Teléfono</label>
                                    <input th:field="*{phone}" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Rol *</label>
                                    <select th:field="*{role}" class="form-control" id="roleSelect" th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'">
                                        <option value="">Seleccionar</option>
                                        <option value="COMPRADOR">Comprador</option>
                                        <option value="VENDEDOR">Vendedor</option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{role}"></div>
                                </div>
                            </div>

                            <div id="dealerFields" class="mt-4" style="display: none;">
                                <h5 class="mb-3">Información del concesionario</h5>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Nombre del concesionario</label>
                                        <input th:field="*{dealerName}" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Ciudad</label>
                                        <input th:field="*{dealerCity}" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Dirección</label>
                                        <input th:field="*{dealerAddress}" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Código postal</label>
                                        <input th:field="*{dealerPostalCode}" class="form-control">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Descripción</label>
                                        <textarea th:field="*{dealerDescription}" class="form-control" rows="4"></textarea>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="theme-btn">Crear cuenta</button>
                            </div>
                        </form>

                        <div class="login-footer mt-4">
                            <p>¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/footer :: scroll-top}"></div>
    <div th:replace="~{fragments/header :: scripts}"></div>
    <script>
        const roleSelect = document.getElementById('roleSelect');
        const dealerFields = document.getElementById('dealerFields');

        function toggleDealerFields() {
            if (!roleSelect || !dealerFields) {
                return;
            }
            dealerFields.style.display = roleSelect.value === 'VENDEDOR' ? 'block' : 'none';
        }

        if (roleSelect) {
            roleSelect.addEventListener('change', toggleDealerFields);
            toggleDealerFields();
        }
    </script>
</body>

</html>
